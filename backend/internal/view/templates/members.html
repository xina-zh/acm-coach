<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Members</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
  <h1 class="mb-3">ACM Coach Admin - Members</h1>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>ID</th><th>Name</th><th>Grade</th><th>Student ID</th><th>Action</th>
      </tr>
    </thead>
    <tbody>
    {{range .Members}}
      <tr>
        <td>{{.ID}}</td>
        <td>{{.Name}}</td>
        <td>{{.Grade}}</td>
        <td>{{.StudentID}}</td>
        <td><a class="btn btn-sm btn-primary" href="/admin/members/{{.ID}}">View</a></td>
      </tr>
    {{end}}
    </tbody>
  </table>
</body>
</html>
